# =============================================================================
# Docker Compose for the Hogar de Ancianos backend.
#
# Since ÉPICA 2 the production target is Postgres (Supabase). This file keeps
# a MySQL service only for legacy / downgrade scenarios; prefer the Postgres
# service for new development.
# =============================================================================

version: '3.8'

# Default service: Postgres for new development.
services:
  # ---------------------------------------------------------------------------
  # Postgres 15 — recommended for new dev work (matches Supabase runtime).
  # ---------------------------------------------------------------------------
  database-postgres:
    image: postgres:15
    container_name: hogar_ancianos_db_postgres
    restart: always
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: hogar_de_ancianos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Apply Supabase/Postgres migrations on first boot (alphabetical order).
      - ./init-postgres.d:/docker-entrypoint-initdb.d
    networks:
      - hogar_network

  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: hogar_ancianos_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: database-postgres
      DB_PORT: 5432
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
      DB_NAME: hogar_de_ancianos
      DB_SSL: 'false'
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production-please
    ports:
      - "3000:3000"
    depends_on:
      - database-postgres
    networks:
      - hogar_network
    volumes:
      - ./logs:/app/logs

  # ---------------------------------------------------------------------------
  # Legacy: MySQL 8. Use only if you must work with the pre-ÉPICA-2 stack.
  # Disabled by default — uncomment the `profiles: [legacy]` block below to use.
  # ---------------------------------------------------------------------------
  database-mysql:
    profiles: ['legacy']
    image: mysql:8.0
    container_name: hogar_ancianos_db_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD:
      MYSQL_DATABASE: hogar_de_ancianos
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hogar_network

volumes:
  postgres_data:
  mysql_data:

networks:
  hogar_network:
    driver: bridge
